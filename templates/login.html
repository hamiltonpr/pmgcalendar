<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live My Gospel — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-brand">
      <div style="font-size:2.4rem;margin-bottom:10px;">✦</div>
      <h1>Live My Gospel</h1>
      <p class="tagline">Your post-mission planner. Keep the momentum.</p>
    </div>

    <div class="login-card">
      <h2>Welcome back</h2>
      <p>Enter your name to access your planner.</p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Your name</label>
          <input name="username" class="form-control w-100" placeholder="e.g. Elder Johnson" autocomplete="off" autofocus />
        </div>
        <button type="submit" class="btn btn-primary btn-block w-100" style="padding:12px;">
          Enter the app
        </button>
      </form>
    </div>

    <p style="text-align:center;color:rgba(255,255,255,0.4);font-size:0.72rem;margin-top:20px;">
      Local demo — no password required
    </p>
  </div>
</body>
</html>
