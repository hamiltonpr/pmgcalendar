{% extends "base.html" %}
{% block content %}

<!-- People List -->
<div class="card" id="peopleCard">
  <div id="peopleList">
    <div style="padding:24px;text-align:center;color:var(--text-muted);font-size:0.85rem;">No contacts yet.</div>
  </div>
</div>

<!-- FAB to add person -->
<button class="fab" id="fabAddPerson" title="Add contact">+</button>

<!-- Person Detail Modal -->
<div class="modal" id="personModal">
  <div class="modal-backdrop" id="personModalBackdrop"></div>
  <div class="modal-dialog" style="max-width:500px;">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="personModalName">Person</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button id="personEditBtn" title="Edit profile" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;">✏️</button>
          <button class="btn-close" id="personModalClose">✕</button>
        </div>
      </div>
      <div class="modal-body" style="padding:0;">

        <!-- Tab bar -->
        <div class="person-tabs">
          <button class="ptab active" data-tab="profile">Profile</button>
          <button class="ptab" data-tab="progress">Progress</button>
          <button class="ptab" data-tab="timeline">Timeline</button>
        </div>

        <!-- Profile tab -->
        <div class="ptab-panel" id="ptab-profile">

          <!-- Dot chip selector (always visible) -->
          <div class="dot-chip-row" id="personDotChips"></div>

          <!-- READ VIEW -->
          <div id="profileReadView">
            <div id="prv-met"   class="profile-field-row" style="display:none"><span class="pf-icon">📍</span><span class="pf-val" id="prv-met-val"></span></div>
            <div id="prv-phone" class="profile-field-row" style="display:none"><span class="pf-icon">📞</span><span class="pf-val" id="prv-phone-val"></span></div>
            <div id="prv-bday"  class="profile-field-row" style="display:none"><span class="pf-icon">🎂</span><span class="pf-val" id="prv-bday-val"></span></div>
            <div id="prv-addr"  class="profile-field-row" style="display:none"><span class="pf-icon">🏠</span><span class="pf-val" id="prv-addr-val"></span></div>
            <div id="prv-ig"    class="profile-field-row" style="display:none"><span class="pf-icon">📸</span><span class="pf-val" id="prv-ig-val"></span></div>
            <div id="prv-notes" class="profile-notes-row" style="display:none"><span id="prv-notes-val" class="profile-notes-val"></span></div>
            <div id="prv-empty" style="display:none;color:var(--text-muted);font-size:0.85rem;text-align:center;padding:14px 0 4px;">No details yet — tap ✏️ to add.</div>
          </div>

          <!-- EDIT VIEW (hidden by default) -->
          <div id="profileEditView" style="display:none;">
            <div style="margin-bottom:10px;">
              <label class="form-label">Name</label>
              <input id="personNameInput" class="form-control w-100" placeholder="Full name" />
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
              <div style="flex:1;min-width:120px;">
                <label class="form-label">Where you met</label>
                <input id="personMetWhere" class="form-control w-100" placeholder="e.g. Ward, work, school" />
              </div>
              <div style="flex:1;min-width:120px;">
                <label class="form-label">When you met</label>
                <input id="personMetWhen" class="form-control w-100" placeholder="e.g. Jan 2026" />
              </div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
              <div style="flex:1;min-width:120px;">
                <label class="form-label">Phone</label>
                <input id="personPhone" class="form-control w-100" placeholder="e.g. (801) 555-1234" type="tel" />
              </div>
              <div style="flex:1;min-width:120px;">
                <label class="form-label">Birthday</label>
                <input id="personBirthday" class="form-control w-100" placeholder="e.g. Mar 14" />
              </div>
            </div>
            <div style="margin-bottom:10px;">
              <label class="form-label">Address</label>
              <input id="personAddress" class="form-control w-100" placeholder="Street, City, State" />
            </div>
            <div style="margin-bottom:10px;">
              <label class="form-label">Instagram</label>
              <input id="personInstagram" class="form-control w-100" placeholder="@username" />
            </div>
            <div>
              <label class="form-label">Notes</label>
              <textarea id="personNotes" class="form-control w-100" rows="2" placeholder="Anything worth remembering…"></textarea>
            </div>
          </div>

        </div>

        <!-- Progress tab -->
        <div class="ptab-panel" id="ptab-progress" style="display:none;">
          <div id="personProgressPanel">
            <div style="color:var(--text-muted);font-size:0.85rem;">Loading…</div>
          </div>
        </div>

        <!-- Timeline tab -->
        <div class="ptab-panel" id="ptab-timeline" style="display:none;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);">Events</div>
            <button class="btn btn-secondary btn-sm" id="linkEventBtn" style="font-size:0.72rem;padding:3px 10px;">+ Link Event</button>
          </div>
          <div id="personEventHistory"></div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm me-auto" id="personDeleteBtn" style="display:none;">Delete</button>
        <button class="btn btn-secondary btn-sm" id="personCancelBtn">Cancel</button>
        <button class="btn btn-primary btn-sm" id="personSaveBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Link Event Picker Modal -->
<div class="modal" id="linkEventModal">
  <div class="modal-backdrop" id="linkEventModalBackdrop"></div>
  <div class="modal-dialog" style="max-width:420px;">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Link a Past Event</span>
        <button class="btn-close" id="linkEventClose">✕</button>
      </div>
      <div style="padding:12px 16px 4px;">
        <input type="text" id="linkEventSearch" class="form-control" placeholder="Search events…">
      </div>
      <div id="linkEventList" style="max-height:340px;overflow-y:auto;padding:8px 16px 16px;"></div>
    </div>
  </div>
</div>

{% endblock %}
