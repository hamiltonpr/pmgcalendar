{% extends "base.html" %}
{% block content %}

<!-- Sort + Filter bar -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
  <div class="section-title" style="margin:0;">Community Feed</div>
  <div style="display:flex;gap:6px;align-items:center;">
    <select id="sortSelect" class="form-select" style="font-size:0.78rem;padding:5px 8px;width:auto;">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="category">By category</option>
    </select>
    <select id="filterSelect" class="form-select" style="font-size:0.78rem;padding:5px 8px;width:auto;">
      <option value="">All categories</option>
      <option value="date_idea">💡 Date Ideas</option>
      <option value="meme">😂 Memes</option>
      <option value="spiritual">✨ Spiritual</option>
      <option value="misc">💬 Misc</option>
    </select>
  </div>
</div>

<!-- Submit post -->
<div class="card" style="margin-bottom:14px;">
  <div style="padding:14px 16px;">
    <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:10px;">Share Something</div>
    <form id="postForm" enctype="multipart/form-data">
      <div class="mb-2">
        <select name="category" class="form-select w-100">
          <option value="date_idea">💡 Date Idea</option>
          <option value="meme">😂 Meme / Joke</option>
          <option value="spiritual">✨ Spiritual Boost</option>
          <option value="misc">💬 Misc</option>
        </select>
      </div>
      <div class="mb-2">
        <textarea name="text" class="form-control w-100" rows="3" placeholder="Share something with the community…"></textarea>
      </div>
      <div class="mb-2">
        <label style="font-size:0.78rem;color:var(--text-muted);display:block;margin-bottom:4px;">Photo (optional)</label>
        <input type="file" name="image" id="postImage" accept="image/*" class="form-control" style="font-size:0.8rem;padding:6px 10px;"/>
        <div id="imagePreview" style="margin-top:6px;display:none;">
          <img id="previewImg" style="max-width:100%;max-height:180px;border-radius:10px;object-fit:cover;"/>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text-muted);cursor:pointer;">
          <input type="checkbox" id="anon" name="anon" checked style="accent-color:var(--primary);"/>
          Post anonymously
        </label>
        <button type="submit" class="btn btn-primary btn-sm">Submit for Review</button>
      </div>
    </form>
    <div style="margin-top:10px;padding:8px 10px;background:#FFF7ED;border-radius:8px;font-size:0.75rem;color:#92400E;border:1px solid #FDE68A;">
      ⚠️ All posts are reviewed before publishing. Please keep content clean, uplifting, and in line with community standards.
    </div>
  </div>
</div>

<!-- Moderation queue (pending posts — visible to you as the CSR) -->
<div id="modQueueWrap" style="display:none;margin-bottom:14px;">
  <div class="section-title">Moderation Queue</div>
  <div class="card" id="modQueue">
    <div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.84rem;">Loading…</div>
  </div>
</div>

<!-- Approved posts feed -->
<div class="section-title" style="margin-top:0;">Posts</div>
<div class="card" id="postsCard">
  <div id="posts">
    <div style="padding:28px;text-align:center;color:var(--text-muted);font-size:0.85rem;">Loading posts…</div>
  </div>
</div>

{% endblock %}
