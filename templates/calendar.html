{% extends "base.html" %}
{% block content %}

<div id="calendar"></div>

<!-- FAB to add event -->
<button class="fab" id="fabAdd" title="Add event">+</button>

<!-- Export / Share bar -->
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap;">
  <a id="exportIcalLink" href="/api/export-ical" class="btn btn-secondary btn-sm" download="my_calendar.ics">⬇ Export to Google Calendar</a>
  <button class="btn btn-secondary btn-sm" id="copyShareLink">🔗 Copy Share Link</button>
</div>

<!-- Event Modal -->
<div class="modal" id="eventModal">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="modalHeading">New Event</span>
        <button class="btn-close" id="modalClose">✕</button>
      </div>
      <!-- Shown for recurring events: choose scope -->
      <div id="recurScopeBar" style="display:none;padding:8px 14px;background:#FFF7ED;border-bottom:1px solid #FDE68A;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:0.78rem;color:#92400E;flex:1;">Repeating event — editing:</span>
        <button type="button" id="scopeOneBtn" class="btn btn-secondary btn-sm" style="font-size:0.73rem;">This event only</button>
        <button type="button" id="scopeAllBtn" class="btn btn-primary btn-sm" style="font-size:0.73rem;">All events</button>
      </div>
      <div class="modal-body">
        <form id="eventForm">
          <input type="hidden" name="id" />
          <input type="hidden" name="start_date" />
          <input type="hidden" name="end_date" />

          <div class="mb-3">
            <label class="form-label">Event title</label>
            <input name="title" class="form-control w-100" placeholder="What's happening?" />
          </div>

          <div class="row">
            <div class="col-6">
              <label class="form-label">Start time</label>
              <div class="d-flex gap-2">
                <select name="start_hour" class="form-select">
                  {% for h in range(1,13) %}<option value="{{h}}">{{h}}</option>{% endfor %}
                </select>
                <select name="start_minute" class="form-select">
                  {% for m in range(0,60) %}<option value="{{'%02d'%m}}">{{'%02d'%m}}</option>{% endfor %}
                </select>
                <select name="start_ampm" class="form-select">
                  <option>AM</option><option>PM</option>
                </select>
              </div>
            </div>
            <div class="col-6">
              <label class="form-label">End time</label>
              <div class="d-flex gap-2">
                <select name="end_hour" class="form-select">
                  {% for h in range(1,13) %}<option value="{{h}}">{{h}}</option>{% endfor %}
                </select>
                <select name="end_minute" class="form-select">
                  {% for m in range(0,60) %}<option value="{{'%02d'%m}}">{{'%02d'%m}}</option>{% endfor %}
                </select>
                <select name="end_ampm" class="form-select">
                  <option>AM</option><option>PM</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row" style="margin-top:10px;">
            <div class="col-6">
              <label class="form-label">Category</label>
              <select name="category" id="eventCategorySelect" class="form-select w-100">
                <!-- populated by JS from /api/categories -->
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Person (optional)</label>
              <select name="person_id" id="personSelect" class="form-select w-100">
                <option value="">— no one attached —</option>
              </select>
            </div>
          </div>

          <!-- Recurrence -->
          <div class="row" style="margin-top:10px;">
            <div class="col-6">
              <label class="form-label">Repeats</label>
              <select name="recur" class="form-select w-100" id="recurSelect">
                <option value="none">Does not repeat</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
            </div>
            <div class="col-6" id="recurEndWrap" style="display:none;">
              <label class="form-label">End date <span style="font-weight:400;color:var(--text-muted);">(optional)</span></label>
              <input type="date" name="recur_end" class="form-control w-100" />
            </div>
          </div>
          <!-- Weekly: which days -->
          <div id="recurWeekDaysWrap" style="display:none;margin-top:8px;">
            <label class="form-label">Repeat on</label>
            <div style="display:flex;gap:5px;flex-wrap:wrap;">
              {% for val, lbl in [(0,'Su'),(1,'Mo'),(2,'Tu'),(3,'We'),(4,'Th'),(5,'Fr'),(6,'Sa')] %}
              <label style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.72rem;font-weight:600;color:var(--text-muted);cursor:pointer;">
                <input type="checkbox" name="rday" value="{{ val }}" style="accent-color:var(--primary);"/>
                {{ lbl }}
              </label>
              {% endfor %}
            </div>
          </div>
          <!-- Monthly: by date or by weekday -->
          <div id="recurMonthlyWrap" style="display:none;margin-top:8px;">
            <label class="form-label">Repeat pattern</label>
            <select id="recurMonthlyType" class="form-select w-100">
              <option value="date">Same date each month (e.g., the 7th)</option>
              <option value="weekday">Same weekday each month (e.g., first Monday)</option>
            </select>
            <div id="recurMonthlyDesc" style="font-size:0.72rem;color:var(--text-muted);margin-top:3px;font-style:italic;"></div>
          </div>

          <div class="mb-2" style="margin-top:10px;">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control w-100" rows="2" placeholder="Plans, thoughts, reflections…"></textarea>
          </div>

          <label style="display:flex;align-items:center;gap:7px;font-size:0.82rem;color:var(--text-muted);cursor:pointer;margin-top:4px;">
            <input type="checkbox" name="is_backup" id="isBackupCheck" style="accent-color:var(--primary);"/>
            Backup plan <span style="font-size:0.72rem;">(shown with dashed border)</span>
          </label>
        </form>
      </div>
      <div class="modal-footer">
        <button id="deleteOneEvent" class="btn btn-danger btn-sm" style="display:none;font-size:0.73rem;">Delete this only</button>
        <button id="deleteEvent" class="btn btn-danger btn-sm" style="display:none;">Delete all</button>
        <span class="me-auto"></span>
        <button id="closeEvent" class="btn btn-secondary btn-sm">Cancel</button>
        <button id="saveEvent" class="btn btn-primary btn-sm">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
// Recur UI is driven by app.js updateRecurUI(); this is just a safety fallback
document.getElementById('recurSelect').addEventListener('change', function() {
  if (typeof updateRecurUI === 'function') updateRecurUI(this.value, null);
});
document.getElementById('recurMonthlyType')?.addEventListener('change', function(){
  if (typeof updateMonthlyDesc === 'function') updateMonthlyDesc(null);
});
</script>

{% endblock %}
